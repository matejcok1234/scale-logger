name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyserial openpyxl pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name ScaleLogger scale_gui.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ScaleLogger-Windows
          path: dist/ScaleLogger.exe
          retention-days: 90
